<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- meta refresh removed: was causing page reload bugs (Leightox fix) -->
<title>Bashira — Brawl Stars Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
:root{
--bg:#08081a;--bg2:#0d0d24;--bg3:#12122e;--bg4:#1a1a3a;--bg5:#222244;
--border:#1a1a38;--border-l:#2a2a50;
--green:#2ecc71;--green-d:#1a7a42;--green-bg:rgba(46,204,113,.12);
--red:#e74c3c;--red-bg:rgba(231,76,60,.12);
--yellow:#f1c40f;--yellow-bg:rgba(241,196,15,.12);
--blue:#3498db;--purple:#9b59b6;
--t1:#f0f0f0;--t2:#a0a0c0;--t3:#606080;--t4:#404060;
--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);background-image:radial-gradient(ellipse at 15% 0%,rgba(46,204,113,.06) 0%,transparent 50%),radial-gradient(ellipse at 85% 100%,rgba(155,89,182,.05) 0%,transparent 50%);color:var(--t1);font-family:var(--font);font-size:15px;-webkit-user-select:none;user-select:none}
input,textarea,select,input[type="date"]{-webkit-user-select:text;user-select:text}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-l);border-radius:3px}
.app{height:100vh;display:flex;flex-direction:column}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;z-index:20;backdrop-filter:blur(8px)}
.topbar-left{display:flex;align-items:center;gap:16px}
.logo{font-weight:900;font-size:20px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}.logo span{color:var(--green)}
.back-btn{display:none;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--t2);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:all .2s}
.back-btn:hover{border-color:var(--green);color:var(--t1)}
.back-btn.show{display:inline-flex;align-items:center;gap:4px}
.page-label{font-size:13px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:8px;object-fit:cover;border:2px solid var(--green)}
.user-name{font-weight:700;font-size:14px}
.demo-strip{background:rgba(46,204,113,.06);border-bottom:1px solid rgba(46,204,113,.12);padding:5px 24px;font-size:12px;color:var(--green);flex-shrink:0}
.demo-strip a{color:var(--green);text-decoration:underline;cursor:pointer}
.main-scroll{flex:1;overflow-y:auto}
.home{max-width:860px;margin:0 auto;padding:56px 24px;text-align:center}
.home h1{font-size:36px;font-weight:900;margin-bottom:4px}.home h1 span{color:var(--green)}
.home-sub{color:var(--t2);font-size:15px;margin-bottom:44px}
.home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:36px;max-width:720px;margin-left:auto;margin-right:auto}
.hcard{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:16px;padding:18px 22px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:14px;box-shadow:0 4px 16px rgba(0,0,0,.35)}
.hcard:hover{border-color:var(--green);box-shadow:0 0 20px rgba(46,204,113,.18),0 4px 16px rgba(0,0,0,.4);transform:translateY(-3px);background:linear-gradient(135deg,var(--bg3),var(--bg4))}
.hcard-ico{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(255,255,255,.08),rgba(255,255,255,.02));border:1.5px solid rgba(255,255,255,.1);flex-shrink:0;box-shadow:inset 0 1px 2px rgba(255,255,255,.05),0 2px 8px rgba(0,0,0,.3)}
.hcard-ico img{width:32px!important;height:32px!important;object-fit:contain!important;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.hcard-label{font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--t1)}
.hcard-desc{font-size:10px;color:var(--t3);margin-top:3px;letter-spacing:.3px}
.home-stats{font-size:13px;color:var(--t3)}.home-stats b{color:var(--green);font-family:var(--mono)}
.page{display:none;padding:24px;max-width:1200px;margin:0 auto}.page.active{display:block}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--font);font-size:12.5px;font-weight:600;transition:all .15s}
.pill:hover{border-color:var(--t3);color:var(--t1)}.pill.active,.pill.green{background:var(--green);color:#000;border-color:var(--green)}
.pill.white{background:var(--t1);color:#000;border-color:var(--t1)}
.search-box{width:100%;max-width:360px;padding:9px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--t1);font-family:var(--font);font-size:14px;outline:none;margin-bottom:16px}
.search-box:focus{border-color:var(--green)}.search-box::placeholder{color:var(--t3)}
table{width:100%;border-collapse:separate;border-spacing:0}
th{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px;color:var(--t2)}
tr:hover td{background:var(--bg3)}
.brawler-cell{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--t1)}
.bico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.bico-sm{width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:#fff;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.wr-g{color:var(--green);font-family:var(--mono);font-weight:700}
.wr-r{color:var(--red);font-family:var(--mono);font-weight:700}
.wr-y{color:var(--yellow);font-family:var(--mono);font-weight:700}
.b-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:6px}
.b-icon{width:56px;height:56px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-weight:800;font-size:16px;color:#fff;border:2px solid transparent;overflow:hidden;position:relative}
.b-icon:hover{border-color:var(--green);transform:scale(1.08)}
.b-icon.sel{border-color:var(--green);box-shadow:0 0 12px rgba(46,204,113,.3)}
.b-icon-name{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.9));padding:2px 1px 3px;font-size:7.5px;font-weight:700;color:#fff;text-align:center;text-transform:uppercase;letter-spacing:.2px;line-height:1}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.kpi-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kpi-val{font-size:28px;font-weight:900;font-family:var(--mono)}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:2px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.card-t{font-weight:700;font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;font-family:var(--mono)}
.badge-w{background:var(--green-bg);color:var(--green)}.badge-l{background:var(--red-bg);color:var(--red)}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--t1);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:all .2s}
.btn:hover{border-color:var(--green)}.btn-g{background:var(--green);color:#000;border-color:var(--green)}.btn-g:hover{background:#27ae60}
.chart-box{height:220px;position:relative}
.hm-wrap{overflow-x:auto;background:var(--bg2);border:1px solid var(--border);border-radius:12px}
.hm{border-collapse:collapse;width:100%;min-width:600px}
.hm th{padding:8px 4px;font-size:9px;text-align:center;background:var(--bg2);border:1px solid var(--bg);font-weight:700;color:var(--t2)}
.hm td{padding:0;text-align:center;font-family:var(--mono);border:1px solid var(--bg);min-width:72px;height:56px;vertical-align:middle}
.hm-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:4px 2px}
.hm-wr{font-size:13px;font-weight:800}
.hm-wl{font-size:9px;opacity:.8}
.hm .rh{background:var(--bg2);font-family:var(--font);font-weight:700;font-size:12px;text-align:left;padding:8px 10px;min-width:140px;position:sticky;left:0;z-index:1;border:1px solid var(--bg)}
.hm .rh-inner{display:flex;align-items:center;gap:8px}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px}
.tc:hover{border-color:var(--border-l)}
.tc-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.tc-logo{width:42px;height:42px;border-radius:10px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px}
.tc-name{font-weight:800;font-size:16px;text-transform:uppercase}
.tc-sub{font-size:11px;color:var(--t3)}
.tc-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.tc-cell{text-align:center}
.tc-cell-val{font-family:var(--mono);font-weight:800;font-size:16px;padding:6px 4px;border-radius:8px}
.tc-cell-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;font-weight:600}
.draft-board{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:start}
.draft-side{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.draft-vs{display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:var(--t3);padding-top:40px}
.draft-slots{display:flex;gap:8px;margin-bottom:16px}
.d-slot{width:70px;height:70px;border-radius:10px;border:2px dashed var(--border-l);display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;font-size:10px;color:var(--t3);background:var(--bg3);transition:all .2s}
.d-slot:hover{border-color:var(--green)}.d-slot.filled{border:2px solid var(--green)}.d-slot.red-filled{border:2px solid var(--red)}
.draft-result{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px}
.adv-bar{height:32px;border-radius:8px;overflow:hidden;display:flex;margin:12px 0}
.adv-bar-l{background:var(--green);transition:width .5s}
.adv-bar-r{background:var(--red);transition:width .5s}
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.map-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.map-card-top{height:28px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff}
.map-card-body{padding:10px;text-align:center}
.map-card-name{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.map-card-wr{font-size:22px;font-weight:800;font-family:var(--mono)}
.map-card-sub{font-size:10px;color:var(--t3)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade{animation:fadeUp .3s ease-out}
@media(max-width:768px){.home-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}.team-grid{grid-template-columns:1fr}.draft-board{grid-template-columns:1fr}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--green);border-radius:12px;padding:14px 20px;color:var(--t1);font-size:13px;font-weight:600;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:toastIn .4s ease-out;max-width:360px;display:flex;align-items:center;gap:10px}
.toast-icon{font-size:20px;flex-shrink:0}
.toast-body{flex:1}.toast-title{font-weight:800;font-size:14px;margin-bottom:2px}.toast-sub{font-size:11px;color:var(--t2)}
.toast-action{padding:5px 12px;border-radius:6px;background:var(--green);color:#000;font-weight:800;font-size:11px;cursor:pointer;border:none;font-family:var(--font);white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
</style>
</head>

  var _lrt=document.getElementById("lastRefreshTime");if(_lrt)_lrt.textContent=now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  var remaining=refreshInterval;
  function updateCountdown(){
    var m=Math.floor(remaining/60);
    var s=remaining%60;
    var _rc=document.getElementById("refreshCountdown");if(!_rc)return;
    _rc.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;

  }
  updateCountdown();
})();

function _blLogo(name){
  if(!name)return "";
  var slug=BL_SLUGS[name]||BL_SLUGS[(name||"").toUpperCase()]||null;
  if(!slug){
    // auto-generate slug from name
    slug=(name||"").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");
  }
  return "https://brawlytics.pro/static/images/teams/"+slug+".png";
}
function teamLogo(name,sz){
  sz=sz||28;
  var db=_findTeamDB(name);
  var ini=db?(db.tag||name.slice(0,2)).toUpperCase().slice(0,3):(name||"??").slice(0,3).toUpperCase();
  var col=db?db.color:("#"+((Math.abs(hsh(name||""))%0xBBBBBB+0x444444).toString(16)));
  var fs=Math.max(8,Math.round(sz*0.32));
  var rad=Math.max(4,Math.round(sz*0.18))+'px';
  var fb='<div class="tl-fb" style="display:flex;width:'+sz+'px;height:'+sz+'px;border-radius:'+rad+';background:linear-gradient(135deg,'+col+','+col+'cc);align-items:center;justify-content:center;font-weight:900;font-size:'+fs+'px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.4)">'+ini+'</div>';
  var logoSrc=db&&db.logo?db.logo:_blLogo(name);
  // Use dark bg for uploaded logos (data:) and liquipedia, team-color bg for brawlytics CDN
  var isDark=logoSrc&&(logoSrc.indexOf('data:')===0||logoSrc.indexOf('liquipedia')>=0);
  var bg=isDark?'#111':col+'22';
  var pad=isDark?'0':'2px';
  var fit=isDark?'cover':'contain';
  return '<span style="display:inline-flex;flex-shrink:0;border-radius:'+rad+';overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.4)"><img src="'+logoSrc+'" width="'+sz+'" height="'+sz+'" style="border-radius:'+rad+';object-fit:'+fit+';background:'+bg+';padding:'+pad+';flex-shrink:0;display:block" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" loading="lazy">'+fb.replace('display:flex','display:none')+'</span>';
}

function _dedupeMatchData(arr){
  var seen={},out=[];
  for(var i=0;i<arr.length;i++){
    var r=arr[i];
    var t1=r.team1_name||"",t2=r.team2_name||"";
    var b1=[r.brawler1||"",r.brawler2||"",r.brawler3||""].sort().join("+");
    var b2=[r.enemy1||"",r.enemy2||"",r.enemy3||""].sort().join("+");
    var pl1=[r.player1||"",r.player2||"",r.player3||""].sort().join("+");
    var pl2=[r.eplayer1||"",r.eplayer2||"",r.eplayer3||""].sort().join("+");
    // Normalize sides alphabetically so team1-vs-team2 = team2-vs-team1
    var sideA,sideB,normResult;
    if(t1<=t2){sideA=t1+"_"+b1+"_"+pl1;sideB=t2+"_"+b2+"_"+pl2;normResult=r.result||"";}
    else{sideA=t2+"_"+b2+"_"+pl2;sideB=t1+"_"+b1+"_"+pl1;normResult=(r.result==="victory"?"defeat":r.result==="defeat"?"victory":r.result)||"";}
    var key=(r.date||"")+"_"+(r.time||"")+"_"+(r.mode||"")+"_"+(r.map||"")+"_"+normResult+"_"+sideA+"_"+sideB;
    if(!seen[key]){seen[key]=1;out.push(r);}
  }
  return out;
}

        set_score:r.set_score||"",set_id:r.set_id||"",set_game_number:r.set_game_number||"",
        tier1:r.average_tier_team1||"unknown",tier2:r.average_tier_team2||"unknown",

function genDemo(){

function compute(data){
  if(!data.length)return{brawlers:[],comps:[],counters:{},synergies:{},modes:[],maps:[],timeline:[],total:0,wins:0};
  var bm={},cm={},ctr={},syn={},mm={},mpm={};
  var total=data.length, wins=0;
  data.forEach(function(r){
    var isW=r.result==="victory";
    if(isW)wins++;
    var my=[r.brawler1,r.brawler2,r.brawler3].filter(Boolean).sort();
    var en=[r.enemy1,r.enemy2,r.enemy3].filter(Boolean).sort();
    my.forEach(function(b){
      if(!bm[b])bm[b]={name:b,w:0,p:0,modes:{},maps:{}};
      bm[b].p++;if(isW)bm[b].w++;
      if(r.mode){if(!bm[b].modes[r.mode])bm[b].modes[r.mode]={w:0,n:0};bm[b].modes[r.mode].n++;if(isW)bm[b].modes[r.mode].w++;}
      if(r.map){if(!bm[b].maps[r.map])bm[b].maps[r.map]={w:0,n:0};bm[b].maps[r.map].n++;if(isW)bm[b].maps[r.map].w++;}
    });
    var ck=my.join("+");
    if(!cm[ck])cm[ck]={comp:my,w:0,p:0,modes:{}};cm[ck].p++;if(isW)cm[ck].w++;
    if(r.mode){if(!cm[ck].modes[r.mode])cm[ck].modes[r.mode]={w:0,n:0};cm[ck].modes[r.mode].n++;if(isW)cm[ck].modes[r.mode].w++;}
    my.forEach(function(a){en.forEach(function(e2){var k=a+"_vs_"+e2;if(!ctr[k])ctr[k]={brawler:a,enemy:e2,w:0,t:0};ctr[k].t++;if(isW)ctr[k].w++;});});
    for(var si=0;si<my.length;si++){for(var sj=si+1;sj<my.length;sj++){var sk=my[si]+"_with_"+my[sj];if(!syn[sk])syn[sk]={a:my[si],b:my[sj],w:0,t:0};syn[sk].t++;if(isW)syn[sk].w++;}}
    if(r.mode){if(!mm[r.mode])mm[r.mode]={name:r.mode,w:0,t:0};mm[r.mode].t++;if(isW)mm[r.mode].w++;}
    if(r.map){if(!mpm[r.map])mpm[r.map]={name:r.map,w:0,t:0};mpm[r.map].t++;if(isW)mpm[r.map].w++;}
  });
  var _validM={};for(var _vmi=0;_vmi<MODES.length;_vmi++)_validM[MODES[_vmi]]=1;
  var brawlers=[];for(var bk in bm){var bb=bm[bk];var bwr=bb.p?((bb.w/bb.p)*100).toFixed(2):"0";var bpr=((bb.p/total)*100).toFixed(2);var modes2=[];for(var mk in bb.modes){if(_validM[mk])modes2.push([mk,bb.modes[mk]]);}modes2.sort(function(a,c){return(c[1].w/c[1].n)-(a[1].w/a[1].n);});brawlers.push({name:bb.name,w:bb.w,p:bb.p,wr:bwr,pr:bpr,modes:bb.modes,maps:bb.maps,bestMode:modes2.length?modes2[0][0]:"-"});}
  brawlers.sort(function(a,b){return(+b.wr)-(+a.wr);});
  var comps=[];for(var ck2 in cm){var cc=cm[ck2];var cwr=cc.p?((cc.w/cc.p)*100).toFixed(2):"0";var modes3=[];for(var mk2 in cc.modes){if(_validM[mk2])modes3.push([mk2,cc.modes[mk2]]);}modes3.sort(function(a,c){return(c[1].w/c[1].n)-(a[1].w/a[1].n);});comps.push({comp:cc.comp,w:cc.w,p:cc.p,wr:cwr,bestMode:modes3.length?modes3[0][0]:"-"});}
  comps.sort(function(a,b){return(+b.wr)-(+a.wr);});
  var modes=[];for(var mmk in mm){var m=mm[mmk];if(_validM[m.name])modes.push({name:m.name,w:m.w,t:m.t,wr:((m.w/m.t)*100).toFixed(1)});}
  var maps=[];for(var mpk in mpm){var mp=mpm[mpk];maps.push({name:mp.name,w:mp.w,t:mp.t,wr:((mp.w/mp.t)*100).toFixed(1)});}
  var dm={};data.forEach(function(r){if(!r.date)return;if(!dm[r.date])dm[r.date]={date:r.date,w:0,t:0};dm[r.date].t++;if(r.result==="victory")dm[r.date].w++;});
  var timeline=[];for(var dk in dm){var dd=dm[dk];timeline.push({date:dd.date,w:dd.w,t:dd.t,wr:((dd.w/dd.t)*100).toFixed(1)});}
  timeline.sort(function(a,b){return a.date.localeCompare(b.date);});
  return{brawlers:brawlers,comps:comps,counters:ctr,synergies:syn,modes:modes,maps:maps,timeline:timeline,total:total,wins:wins};
}

function getFD(){var d=matchData;if(filters.dateFrom||filters.dateTo){var from=filters.dateFrom?new Date(filters.dateFrom):null;var to=filters.dateTo?new Date(filters.dateTo):null;if(to)to.setHours(23,59,59,999);d=d.filter(function(r){if(!r.date)return false;var rd=_pd(r.date);if(isNaN(rd))return false;if(from&&rd<from)return false;if(to&&rd>to)return false;return true;});}else if(filters.days&&filters.days<9999){var mx=null;for(var i=0;i<matchData.length;i++){if(!matchData[i].date)continue;var rd=_pd(matchData[i].date);if(!isNaN(rd)&&(!mx||rd>mx))mx=rd;}if(mx){var cut=new Date(mx.getTime()-filters.days*86400000);d=d.filter(function(r){if(!r.date)return false;var rd=_pd(r.date);return !isNaN(rd)&&rd>=cut;});}}if(filters.mode)d=d.filter(function(r){return (r.mode||"").toLowerCase()===filters.mode.toLowerCase();});return d;}
function _pd(s){if(!s)return NaN;if(s.indexOf("/")>=0){var p=s.split("/");return new Date(p[2]+"-"+p[1]+"-"+p[0]);}return new Date(s);}
function getDateRange(d){
  function fmt(ds){if(!ds)return"?";var p=ds.split("-");return p.length===3?(p[2]+"/"+p[1]+"/"+p[0]):ds;}
  var mn=null,mx=null;
  for(var i=0;i<d.length;i++){var dt=d[i].date;if(!dt)continue;if(!mn||dt<mn)mn=dt;if(!mx||dt>mx)mx=dt;}
  return{from:mn||"",to:mx||"",label:fmt(mn)+" → "+fmt(mx)};
}

      }
      return r;
    });
    focusS=compute(focusData);
  }

  var wr=focusS.total?((focusS.wins/focusS.total)*100).toFixed(1):"0";

// ═══ TEAMS ═══
function genTeamData(){
  var data=matchData.slice();
  if(filters.days&&filters.days<9999){var mx=null;for(var _i=0;_i<data.length;_i++){if(!data[_i].date)continue;var rd=_pd(data[_i].date);if(!isNaN(rd)&&(!mx||rd>mx))mx=rd;}if(mx){var cut=new Date(mx.getTime()-filters.days*86400000);data=data.filter(function(r){if(!r.date)return false;var rd2=_pd(r.date);return !isNaN(rd2)&&rd2>=cut;});}}
  var tmap={};
  data.forEach(function(r){
    [r.team1_name,r.team2_name].forEach(function(tn){
      if(!tn||tn==="unknown"||tn.indexOf("Unknown")===0)return;
      if(!tmap[tn])tmap[tn]={name:tn,games:[],setsW:0,setsL:0,region:"",tier:"",players:{},playerBrawlers:{},modeMap:{},mapMap:{},brawlerMap:{},h2hMap:{},dailyMap:{},scrims:[]};
    });
  });
  data.forEach(function(r){
    var t1=r.team1_name,t2=r.team2_name;
    var isWin1=r.result==="victory";
    if(tmap[t1]){
      var td=tmap[t1];
      td.games.push(r);
      if(r.region1&&r.region1!=="unknown")td.region=r.region1;
      if(r.tier1&&r.tier1!=="unknown")td.tier=td.tier||r.tier1;
      var pls=[r.player1,r.player2,r.player3],brs=[r.brawler1,r.brawler2,r.brawler3];
      for(var pi=0;pi<3;pi++){var p=pls[pi],b=brs[pi];if(p){td.players[p]=1;if(b){if(!td.playerBrawlers[p])td.playerBrawlers[p]={};if(!td.playerBrawlers[p][b])td.playerBrawlers[p][b]={w:0,p:0};td.playerBrawlers[p][b].p++;if(isWin1)td.playerBrawlers[p][b].w++;}}}
      [r.brawler1,r.brawler2,r.brawler3].forEach(function(b){if(b){if(!td.brawlerMap[b])td.brawlerMap[b]={w:0,p:0};td.brawlerMap[b].p++;if(isWin1)td.brawlerMap[b].w++;}});
      if(r.mode){if(!td.modeMap[r.mode])td.modeMap[r.mode]={w:0,l:0};if(isWin1)td.modeMap[r.mode].w++;else td.modeMap[r.mode].l++;}
      if(r.map){if(!td.mapMap[r.map])td.mapMap[r.map]={w:0,l:0};if(isWin1)td.mapMap[r.map].w++;else td.mapMap[r.map].l++;}
      if(t2&&tmap[t2]){if(!td.h2hMap[t2])td.h2hMap[t2]={w:0,l:0};if(isWin1)td.h2hMap[t2].w++;else td.h2hMap[t2].l++;}
      if(r.date){if(!td.dailyMap[r.date])td.dailyMap[r.date]={w:0,t:0};td.dailyMap[r.date].t++;if(isWin1)td.dailyMap[r.date].w++;}
    }
    if(tmap[t2]){
      var td2=tmap[t2];
      td2.games.push(r);
      if(r.region2&&r.region2!=="unknown")td2.region=r.region2;
      if(r.tier2&&r.tier2!=="unknown")td2.tier=td2.tier||r.tier2;
      var pls2=[r.eplayer1,r.eplayer2,r.eplayer3],brs2=[r.enemy1,r.enemy2,r.enemy3];
      for(var pi2=0;pi2<3;pi2++){var p2=pls2[pi2],b2=brs2[pi2];if(p2){td2.players[p2]=1;if(b2){if(!td2.playerBrawlers[p2])td2.playerBrawlers[p2]={};if(!td2.playerBrawlers[p2][b2])td2.playerBrawlers[p2][b2]={w:0,p:0};td2.playerBrawlers[p2][b2].p++;if(!isWin1)td2.playerBrawlers[p2][b2].w++;}}}
      [r.enemy1,r.enemy2,r.enemy3].forEach(function(b){if(b){if(!td2.brawlerMap[b])td2.brawlerMap[b]={w:0,p:0};td2.brawlerMap[b].p++;if(!isWin1)td2.brawlerMap[b].w++;}});
      if(r.mode){if(!td2.modeMap[r.mode])td2.modeMap[r.mode]={w:0,l:0};if(!isWin1)td2.modeMap[r.mode].w++;else td2.modeMap[r.mode].l++;}
      if(r.map){if(!td2.mapMap[r.map])td2.mapMap[r.map]={w:0,l:0};if(!isWin1)td2.mapMap[r.map].w++;else td2.mapMap[r.map].l++;}
      if(t1&&tmap[t1]){if(!td2.h2hMap[t1])td2.h2hMap[t1]={w:0,l:0};if(!isWin1)td2.h2hMap[t1].w++;else td2.h2hMap[t1].l++;}
      if(r.date){if(!td2.dailyMap[r.date])td2.dailyMap[r.date]={w:0,t:0};td2.dailyMap[r.date].t++;if(!isWin1)td2.dailyMap[r.date].w++;}
    }
  });
  var setResults={};
  data.forEach(function(r){
    if(!r.set_id||!r.set_score)return;
    if(setResults[r.set_id])return;
    setResults[r.set_id]=r;
  });
  Object.keys(tmap).forEach(function(tn){
    var td=tmap[tn];td.setsW=0;td.setsL=0;
    var counted={};
    td.games.forEach(function(g){
      if(!g.set_id||!g.set_score||counted[g.set_id])return;
      counted[g.set_id]=1;
      var parts=g.set_score.split("-").map(Number);
      var isT1=g.team1_name===tn;
      var sw=isT1?parts[0]:parts[1],sl=isT1?parts[1]:parts[0];
      if(sw>sl)td.setsW++;else if(sl>sw)td.setsL++;
    });
  });
  var teams=[];
  var regionMap={NORTHAMERICA:"NA",EMEA:"EMEA",SOUTHAMERICA:"SA",EASTASIA:"APAC",SOUTHEASTASIA:"APAC",unknown:""};
  Object.keys(tmap).forEach(function(tn){
    var td=tmap[tn];
    var totalG=td.games.length;
    if(totalG<2)return;
    var wG=td.games.filter(function(g){return(g.team1_name===tn&&g.result==="victory")||(g.team2_name===tn&&g.result!=="victory");}).length;
    var totalS=td.setsW+td.setsL;
    // Fallback: if no set data, use game-based W/L
    var useGames=totalS===0;
    if(useGames){totalS=totalG;td.setsW=wG;td.setsL=totalG-wG;}
    var wr=totalS?((td.setsW/totalS)*100).toFixed(1):"0";
    var dbInfo=_findTeamDB(tn);
    var region=dbInfo?dbInfo.region:(regionMap[td.region]||td.region||"");
    var tag=dbInfo?dbInfo.tag:tn.replace(/[^A-Z0-9]/gi,"").slice(0,3).toUpperCase();
    var color=dbInfo?dbInfo.color:bc(tn);
    var players=Object.keys(td.players);
    var form=[];var counted2={};
    var sortedG=td.games.slice().sort(function(a,b){return a.date>b.date?1:-1;});
    if(useGames){
      for(var i=sortedG.length-1;i>=0&&form.length<5;i--){
        var g=sortedG[i];
        var isWin=(g.team1_name===tn&&g.result==="victory")||(g.team2_name===tn&&g.result!=="victory");
        form.push(isWin?"W":"L");
      }
    } else {
      for(var i=sortedG.length-1;i>=0&&form.length<5;i--){
        var g=sortedG[i];if(!g.set_id||!g.set_score||counted2[g.set_id])continue;
        counted2[g.set_id]=1;
        var pp=g.set_score.split("-").map(Number);
        var isT=g.team1_name===tn;
        form.push((isT?pp[0]:pp[1])>(isT?pp[1]:pp[0])?"W":"L");
      }
    }
    var modeStats=[];Object.keys(td.modeMap).forEach(function(m){var ms=td.modeMap[m];modeStats.push({mode:m,w:ms.w,l:ms.l,wr:((ms.w/(ms.w+ms.l))*100).toFixed(1)});});
    modeStats.sort(function(a,b){return(b.w+b.l)-(a.w+a.l);});
    var mapStats=[];Object.keys(td.mapMap).forEach(function(m){var ms=td.mapMap[m];mapStats.push({map:m,w:ms.w,l:ms.l,wr:((ms.w/(ms.w+ms.l))*100).toFixed(1)});});
    mapStats.sort(function(a,b){return(+b.wr)-(+a.wr);});
    var topB=[];Object.keys(td.brawlerMap).forEach(function(b){var bs=td.brawlerMap[b];topB.push({name:b,w:bs.w,p:bs.p,wr:((bs.w/bs.p)*100).toFixed(1)});});
    topB.sort(function(a,b){return b.p-a.p;});
    var h2h=[];Object.keys(td.h2hMap).forEach(function(vs){var hs=td.h2hMap[vs];h2h.push({vs:vs,w:hs.w,l:hs.l,wr:((hs.w/(hs.w+hs.l))*100).toFixed(1)});});
    h2h.sort(function(a,b){return(b.w+b.l)-(a.w+a.l);});
    var days=[];Object.keys(td.dailyMap).sort().forEach(function(d){days.push({d:d,w:td.dailyMap[d].w,t:td.dailyMap[d].t});});
    var scrimMap={};var counted3={};
    sortedG.forEach(function(g){
      var vs=g.team1_name===tn?g.team2_name:g.team1_name;
      if(useGames){
        var key=g.date+"_"+vs;
        if(!scrimMap[key])scrimMap[key]={date:g.date,vs:vs,w:0,l:0};
        var isWin2=(g.team1_name===tn&&g.result==="victory")||(g.team2_name===tn&&g.result!=="victory");
        if(isWin2)scrimMap[key].w++;else scrimMap[key].l++;
      } else {
        if(!g.set_id||counted3[g.set_id])return;counted3[g.set_id]=1;
        var key=g.date+"_"+vs;
        if(!scrimMap[key])scrimMap[key]={date:g.date,vs:vs,w:0,l:0};
        var pp2=g.set_score.split("-").map(Number);

      }
    });
    var scrims=[];Object.keys(scrimMap).forEach(function(k){scrims.push(scrimMap[k]);});
    scrims.sort(function(a,b){return a.date>b.date?-1:1;});
    var lastDate=scrims.length?scrims[0].date:"-";
    // Build player brawler data for roster

    players.forEach(function(pn){
      var pbMap=td.playerBrawlers[pn]||{};
      var pbList=[];Object.keys(pbMap).forEach(function(b){pbList.push({name:b,w:pbMap[b].w,p:pbMap[b].p,wr:pbMap[b].p?((pbMap[b].w/pbMap[b].p)*100).toFixed(0):"0"});});
      pbList.sort(function(a,b){return(+b.wr)-(+a.wr)||(b.p-a.p);});

var _cpCF="";
var _cpMapF="";
var _cpModeF="";
function selD(n){draftPick=n;}
function subD(){
  if(!draftPick)return;
  var _fd=getFD();
  // Apply map/mode context from counter pick filters
  if(_cpModeF)_fd=_fd.filter(function(r){return r.mode===_cpModeF;});
  if(_cpMapF)_fd=_fd.filter(function(r){return r.map===_cpMapF;});
  var s=compute(_fd);
  
  // Intelligent scoring based on real data
  var sc=50; // baseline
  var factors=[];
  
  // 1. Direct counter WR (weight: 40%)
  var k=draftPick+"_vs_"+draftEnemy,m=s.counters[k];
  if(m&&m.t>=2){
    var counterWr=(m.w/m.t)*100;
    sc=Math.round(counterWr*0.4 + sc*0.6);
    factors.push("vs "+draftEnemy+": "+counterWr.toFixed(0)+"%");
  }
  
  // 2. Brawler overall WR in this context (weight: 20%)
  var bData=null;
  for(var bi=0;bi<s.brawlers.length;bi++){if(s.brawlers[bi].name===draftPick){bData=s.brawlers[bi];break;}}
  if(bData&&bData.p>=2){
    var bwr=+bData.wr;
    sc=Math.round(sc*0.8 + bwr*0.2);
    factors.push("Overall WR: "+bData.wr+"%");
  }
  
  // 3. Map-specific WR bonus (weight: 15%)
  if(_cpMapF&&bData&&bData.maps&&bData.maps[_cpMapF]){
    var mapD=bData.maps[_cpMapF];
    if(mapD.n>=2){
      var mapWr=(mapD.w/mapD.n)*100;
      sc=Math.round(sc*0.85 + mapWr*0.15);
      factors.push(_cpMapF+": "+mapWr.toFixed(0)+"%");
    }
  }
  
  // 4. Synergy bonus — how well does this pick work with common teammates (weight: 10%)
  var synBonus=0,synCount=0;
  for(var sk in s.synergies){var sy=s.synergies[sk];
    if((sy.a===draftPick||sy.b===draftPick)&&sy.t>=3){
      synBonus+=(sy.w/sy.t)*100;synCount++;
    }
  }
  if(synCount){
    var avgSyn=synBonus/synCount;
    sc=Math.round(sc*0.9 + avgSyn*0.1);
    factors.push("Avg synergy: "+avgSyn.toFixed(0)+"%");
  }
  
  // 5. Pick rate confidence — more data = more reliable
  var confidence=bData?Math.min(1,bData.p/10):0.5;
  sc=Math.round(sc*confidence + 50*(1-confidence));
  
  sc=Math.max(0,Math.min(100,sc));
  
  draftHistory.push({enemy:draftEnemy,pick:draftPick,score:sc,factors:factors,map:_cpMapF,mode:_cpModeF});
  nxtD();
}
function nxtD(){var s=compute(getFD());var names=s.brawlers.map(function(b){return b.name;});draftEnemy=names[~~(Math.random()*names.length)];draftPick="";go("draft");}
function setCPCF(c){_cpCF=c;var pills=document.querySelectorAll("#cpClassPills .pill");pills.forEach(function(p){p.classList.remove("white","green");});if(!c)pills[0].classList.add("white");else pills.forEach(function(p){if(p.textContent.toUpperCase().indexOf(c.toUpperCase())>=0)p.classList.add("green");});filterCPGrid("");}

    t1Players.forEach(function(p){
      if(!p.n)return;
      if(!pm[p.n])pm[p.n]={w:0,l:0,p:0,team:"",brawlers:{},modes:{}};
      pm[p.n].p++;
      if(r.result==="victory")pm[p.n].w++;else pm[p.n].l++;
      if(r.team1_name&&r.team1_name.indexOf("Unknown")!==0)pm[p.n].team=r.team1_name;
      if(p.b){
        if(!pm[p.n].brawlers[p.b])pm[p.n].brawlers[p.b]={w:0,p:0};
        pm[p.n].brawlers[p.b].p++;
        if(r.result==="victory")pm[p.n].brawlers[p.b].w++;
      }
      if(r.mode){
        if(!pm[p.n].modes[r.mode])pm[p.n].modes[r.mode]={w:0,p:0};
        pm[p.n].modes[r.mode].p++;
        if(r.result==="victory")pm[p.n].modes[r.mode].w++;
      }
    });
    t2Players.forEach(function(p){
      if(!p.n)return;
      if(!pm[p.n])pm[p.n]={w:0,l:0,p:0,team:"",brawlers:{},modes:{}};
      pm[p.n].p++;
      var eWin=r.result!=="victory";
      if(eWin)pm[p.n].w++;else pm[p.n].l++;
      if(r.team2_name&&r.team2_name.indexOf("Unknown")!==0)pm[p.n].team=r.team2_name;
      if(p.b){
        if(!pm[p.n].brawlers[p.b])pm[p.n].brawlers[p.b]={w:0,p:0};
        pm[p.n].brawlers[p.b].p++;
        if(eWin)pm[p.n].brawlers[p.b].w++;
      }
      if(r.mode){
        if(!pm[p.n].modes[r.mode])pm[p.n].modes[r.mode]={w:0,p:0};
        pm[p.n].modes[r.mode].p++;
        if(eWin)pm[p.n].modes[r.mode].w++;
      }
    });
  }
  // Build sorted list
  var pList=[];
  for(var k in pm){
    var pp=pm[k];
    var wr=pp.p?((pp.w/pp.p)*100).toFixed(1):"0";
    // Best brawler
    var bArr=[];for(var bk in pp.brawlers){var bb=pp.brawlers[bk];bArr.push({name:bk,w:bb.w,p:bb.p,wr:bb.p?((bb.w/bb.p)*100).toFixed(1):"0"});}
    bArr.sort(function(a,b){return b.p-a.p;});
    // Best mode
    var mArr=[];for(var mk in pp.modes){var mm=pp.modes[mk];mArr.push({name:mk,w:mm.w,p:mm.p,wr:mm.p?((mm.w/mm.p)*100).toFixed(1):"0"});}
    mArr.sort(function(a,b){return b.p-a.p;});
    pList.push({name:k,w:pp.w,l:pp.l,p:pp.p,wr:wr,team:pp.team,brawlers:bArr,modes:mArr,best:bArr[0]||null,bestMode:mArr[0]||null});
  }
  pList.sort(function(a,b){return b.p-a.p;});

  var h='<div class="fade">';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:22px">👤</span><span style="font-size:24px;font-weight:900">PLAYERS</span><span style="font-size:13px;color:var(--t3);margin-left:8px">'+pList.length+' joueurs</span></div>';

  h+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">';

  for(var pli=0;pli<pList.length;pli++){

    h+='<div class="player-list-item" data-name="'+p.name.toLowerCase()+'" data-team="'+(p.team||"").toLowerCase()+'" onclick="showPlayerDetail(\''+p.name.replace(/'/g,"\\'")+'\')" style="padding:10px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor=\'var(--green)\'" onmouseout="this.style.borderColor=\'var(--border)\'">';

  h+='</div></div>';

  if(pList.length) showPlayerDetail(pList[0].name);

function filterPlayers(){
  var q=(document.getElementById("playerSearch").value||"").toLowerCase();
  document.querySelectorAll(".player-list-item").forEach(function(e){
    var match=!q||e.dataset.name.indexOf(q)>=0||e.dataset.team.indexOf(q)>=0;
    e.style.display=match?"":"none";
  });
}

    h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
    h+='<div class="pill '+(!_pdMap?"white":"")+'" onclick="_pdMap=\'\';showPlayerDetail(\''+name.replace(/'/g,"\\'")+'\')">All Maps</div>';

    for(var pfmpi=0;pfmpi<pfmaps.length;pfmpi++){var pfmp=pfmaps[pfmpi];h+='<div class="pill '+(_pdMap===pfmp.name?"green":"")+'" onclick="_pdMap=\''+pfmp.name.replace(/'/g,"\\'")+'\';showPlayerDetail(\''+name.replace(/'/g,"\\'")+'\')">'+pfmp.name+'</div>';}

    pfData.forEach(function(r){
      var found=false,isW=false;
      if([r.player1,r.player2,r.player3].indexOf(name)>=0){found=true;isW=r.result==="victory";var brs=[r.brawler1,r.brawler2,r.brawler3];var pls=[r.player1,r.player2,r.player3];for(var z=0;z<3;z++){if(pls[z]===name&&brs[z]){var b=brs[z];if(!pfBm[b])pfBm[b]={w:0,p:0};pfBm[b].p++;if(isW)pfBm[b].w++;}}}

      h+='</div>';
    }else{
      h+='<div class="card" style="margin-bottom:16px;text-align:center;color:var(--t3);padding:20px">Aucune donnée pour '+(_pdMap||_pdMode)+'</div>';

  }

  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  h+='<div class="card"><div class="card-t">🎮 Brawler Pool</div>';
  if(p.brawlers.length){

function startDraft(fp){

// ── BOT AI ──
function botScore(bName,s){
  var userPicks=draft.picks1;
  var botPicks=draft.picks2;
  var score=0;
  var reasons=0;

  // ═══ PRIORITY 1: Direct counter WR vs each user pick (battle log data) ═══
  // For each brawler the user has already picked, how well does bName beat it?
  var counterScore=0;
  for(var i=0;i<userPicks.length;i++){
    var ck=bName+"_vs_"+userPicks[i];
    var cm=s.counters[ck];
    if(cm&&cm.t>=2){
      var cwr=(cm.w/cm.t)*100;
      counterScore+=cwr; // raw WR vs that pick
      reasons++;
    } else {
      counterScore+=50; // no data = neutral
      reasons++;
    }
  }

  // ═══ PRIORITY 2: Reverse — make sure user's picks don't counter bName ═══
  // Penalize if the user's picks historically beat this brawler
  var antiScore=0;
  for(var i2=0;i2<userPicks.length;i2++){
    var ck2=userPicks[i2]+"_vs_"+bName;
    var cm2=s.counters[ck2];
    if(cm2&&cm2.t>=2){
      var cwr2=(cm2.w/cm2.t)*100;
      antiScore+=(100-cwr2); // invert: if user's pick beats bName → penalize
    } else {
      antiScore+=50;
    }
  }

  // ═══ PRIORITY 3: Anticipate user's FUTURE picks ═══
  // Based on what's strongest on this map/mode, anticipate 1-2 more user picks
  // and pick something that counters them pre-emptively
  var futurePicks=[];
  var allUsed=userPicks.concat(botPicks).concat([bName]);
  // Find top meta brawlers on map/mode the user hasn't picked yet
  var potentialUserPicks=s.brawlers.filter(function(b2){
    return allUsed.indexOf(b2.name)<0;
  }).slice(0,8); // top 8 by WR on current data
  
  var futureScore=0;
  for(var fi=0;fi<Math.min(3,potentialUserPicks.length);fi++){
    var fp=potentialUserPicks[fi];
    var fk=bName+"_vs_"+fp.name;
    var fm=s.counters[fk];
    if(fm&&fm.t>=2){futureScore+=(fm.w/fm.t)*100-50;}
  }

  // ═══ PRIORITY 4: Synergy with bot's own picks ═══
  var synergyScore=0;
  for(var k=0;k<botPicks.length;k++){
    var sk1=bName+"_with_"+botPicks[k],sk2=botPicks[k]+"_with_"+bName;
    var sm=s.synergies[sk1]||s.synergies[sk2];
    if(sm&&sm.t>=2){synergyScore+=(sm.w/sm.t)*100-50;}
  }

  // ═══ COMBINE: heavy weight on counters, rest as bonus ═══
  if(reasons>0){
    score=(counterScore/reasons)*0.5 + (antiScore/Math.max(1,userPicks.length))*0.3;
  } else {
    // No user picks yet → use map/mode WR as baseline
    var bd=null;
    for(var bi=0;bi<s.brawlers.length;bi++){if(s.brawlers[bi].name===bName){bd=s.brawlers[bi];break;}}
    if(bd){
      if(draft.selMap&&bd.maps&&bd.maps[draft.selMap]&&bd.maps[draft.selMap].n>=2){score=(bd.maps[draft.selMap].w/bd.maps[draft.selMap].n)*100;}
      else if(draft.selMode&&bd.modes&&bd.modes[draft.selMode]&&bd.modes[draft.selMode].n>=2){score=(bd.modes[draft.selMode].w/bd.modes[draft.selMode].n)*100;}
      else{score=+bd.wr||50;}
    } else {score=50;}
  }

  // Add future counter bonus and synergy as secondary bonuses
  score+=futureScore*0.15;
  score+=synergyScore*0.05;
  score+=Math.random()*2-1; // tiny noise to break exact ties

  return Math.max(0,Math.min(100,score));
}



function botAutoPick(s){
  if(draft.step>=6)return;
  var team=draftTeam(draft.step);
  if(team===1)return;
  var used=draft.picks1.concat(draft.picks2);
  var available=draft.allBrawlers.filter(function(b){return used.indexOf(b)<0;});
  if(!available.length)return;
  var best=null,bestScore=-999;
  for(var i=0;i<available.length;i++){var sc=botScore(available[i],s);if(sc>bestScore){bestScore=sc;best=available[i];}}
  if(!best)best=available[0];
  draft.picks2.push(best);
  draft.step++;
  if(draft.step<6){var nextTeam=draftTeam(draft.step);if(nextTeam===2){setTimeout(function(){var s2=compute(getFD());botAutoPick(s2);renderDraft(document.getElementById("pg-draft"),s2);},600);}}
}

function afterUserPick(){
  if(draft.step<6){
    var nextTeam=draftTeam(draft.step);
    if(nextTeam===2){
      setTimeout(function(){
        var s2=compute(getFD());
        botAutoPick(s2);
        renderDraft(document.getElementById("pg-draft"),s2);
      },500);
    }
  }
}

function calcDraftAdv(s){
  var t1=0,t2=0,n1=draft.picks1.length,n2=draft.picks2.length;
  var i,j,bd,k,m;
  // Individual WR scores
  for(i=0;i<n1;i++){bd=null;for(j=0;j<s.brawlers.length;j++){if(s.brawlers[j].name===draft.picks1[i]){bd=s.brawlers[j];break;}}t1+=bd?(+bd.wr):50;}
  for(i=0;i<n2;i++){bd=null;for(j=0;j<s.brawlers.length;j++){if(s.brawlers[j].name===draft.picks2[i]){bd=s.brawlers[j];break;}}t2+=bd?(+bd.wr):50;}
  // H2H matchup bonuses
  for(i=0;i<n1;i++){for(j=0;j<n2;j++){
    k=draft.picks1[i]+"_vs_"+draft.picks2[j];m=s.counters[k];
    if(m&&m.t>=2){var wr=(m.w/m.t)*100;if(wr>50)t1+=(wr-50)*0.4;else t2+=(50-wr)*0.4;}
  }}
  if(t1===0&&t2===0)return 50;
  return(t1/(t1+t2))*100;
}

// ═══ BAN OPTIMIZER ═══
var _banTarget="";
function setBanTarget(t){_banTarget=t;go("banopt");}
function pgBanOpt(el,s,data){
  var teams=genTeamData();
  var teamNames=teams.filter(function(t){return !t.isUnknown;}).map(function(t){return t.name;}).sort();
  var h='<div class="fade">';
  h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">';
  h+='<div style="font-size:22px;font-weight:900">🚫 BAN OPTIMIZER</div>';
  h+='<select onchange="setBanTarget(this.value)" style="padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--t1);font-family:var(--font);font-size:14px;font-weight:600">';
  h+='<option value="">— Select opponent —</option>';
  for(var ti=0;ti<teamNames.length;ti++){var tn=teamNames[ti];var dbI=TEAMS_DB[tn];var dispN=dbI?dbI.org:tn;h+='<option value="'+tn.replace(/"/g,"&quot;")+'"'+(_banTarget===tn?" selected":"")+'>'+dispN+'</option>';}
  h+='</select></div>';
  if(!_banTarget){h+='<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">🚫</div><div style="font-size:16px;font-weight:700;color:var(--t2)">Select an opponent to calculate optimal bans</div></div></div>';el.innerHTML=h;return;}
  var tm=null;for(var i=0;i<teams.length;i++){if(teams[i].name===_banTarget){tm=teams[i];break;}}
  if(!tm){h+='<div class="card">Team not found</div></div>';el.innerHTML=h;return;}
  var dbI=_findTeamDB(tm.name);var dispN=dbI?dbI.org:tm.name;
  // Calculate ban impact: for each brawler, how much does banning it hurt the opponent?
  var banScores=[];
  var minBanGames=5;
  for(var bi=0;bi<tm.topB.length;bi++){var b=tm.topB[bi];
    if(b.p<minBanGames)continue;
    var impact=0;
    // Usage weight (how much they play it)
    var usageRate=tm.t>0?(b.p/tm.t):0;
    impact+=usageRate*40;
    // WR weight (how good they are with it)
    impact+=(+b.wr>50?((+b.wr-50)/50)*35:0);
    // Exclusivity (do few other brawlers replace it? check if same class has alternatives)
    var cls=BCLS[b.name]||"";var sameClassCount=0;
    for(var bj=0;bj<tm.topB.length;bj++){if(bj!==bi&&BCLS[tm.topB[bj].name]===cls&&tm.topB[bj].p>=2)sameClassCount++;}
    if(sameClassCount===0)impact+=15;else if(sameClassCount===1)impact+=8;
    // Recent trend (was it played in last 5 games?)
    var recentCount=0;var recentGames=tm.games?tm.games.slice(-10):[];
    recentGames.forEach(function(g){var brs=g.team1_name===_banTarget?[g.brawler1,g.brawler2,g.brawler3]:[g.enemy1,g.enemy2,g.enemy3];if(brs.indexOf(b.name)>=0)recentCount++;});
    impact+=recentCount*2;
    banScores.push({name:b.name,p:b.p,wr:b.wr,impact:Math.round(impact),usage:(usageRate*100).toFixed(0),recent:recentCount,cls:cls});
  }
  banScores.sort(function(a,b){return b.impact-a.impact;});

  h+='<div class="card" style="margin-bottom:16px;border-color:var(--red);border-width:2px">';
  h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="font-size:10px;color:var(--red);font-weight:800;text-transform:uppercase;letter-spacing:1px">RECOMMENDED BANS vs '+dispN.toUpperCase()+'</div></div>';
  // Top 2 recommended bans
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">';
  for(var ri=0;ri<Math.min(2,banScores.length);ri++){var rec=banScores[ri];
    h+='<div style="background:linear-gradient(135deg,rgba(231,76,60,.12),rgba(231,76,60,.02));border:2px solid rgba(231,76,60,.3);border-radius:14px;padding:20px;text-align:center">';
    h+='<div style="font-size:10px;font-weight:900;color:var(--red);margin-bottom:8px">BAN '+(ri+1)+'</div>';
    h+=bIcon(rec.name,56);
    h+='<div style="font-weight:900;font-size:18px;margin-top:8px">'+rec.name+'</div>';
    h+='<div style="font-family:var(--mono);font-weight:800;font-size:24px;color:var(--red);margin-top:4px">'+rec.impact+'</div>';
    h+='<div style="font-size:10px;color:var(--t3)">Impact Score</div>';
    h+='<div style="display:flex;justify-content:center;gap:12px;margin-top:8px;font-size:11px">';
    h+='<span style="color:var(--t2)">'+rec.usage+'% usage</span>';
    h+='<span class="'+wrCol(rec.wr)+'">'+rec.wr+'% wr</span>';
    h+='<span style="color:var(--yellow)">'+rec.recent+'/10 recent</span>';
    h+='</div></div>';
  }
  h+='</div>';
  // Full ranking
  h+='<div style="font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;margin-bottom:8px">ALL BAN CANDIDATES</div>';
  for(var ai=0;ai<Math.min(10,banScores.length);ai++){var ab=banScores[ai];
    var barW=Math.min(ab.impact,100);
    h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">';
    h+='<span style="font-weight:900;font-family:var(--mono);font-size:11px;color:var(--t3);min-width:24px">#'+(ai+1)+'</span>';
    h+=bIconSm(ab.name);
    h+='<span style="font-weight:700;font-size:13px;min-width:80px">'+ab.name+'</span>';
    h+='<div style="flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+barW+'%;background:linear-gradient(90deg,var(--red),#e67e22);border-radius:4px"></div></div>';
    h+='<span style="font-family:var(--mono);font-weight:800;font-size:14px;color:var(--red);min-width:36px;text-align:right">'+ab.impact+'</span>';
    h+='<span style="font-size:10px;color:var(--t3);min-width:50px;text-align:right">'+ab.p+'g · '+ab.wr+'%</span></div>';
  }
  h+='</div></div>';
  el.innerHTML=h;
}

var da={mode:"",map:"",fp:0,step:0,picks1:[],picks2:[],started:false,searchQ:""};
var DA_SEQ=[{team:1},{team:2},{team:2},{team:1},{team:1},{team:2}];
function daTeam(stepIdx){if(!da.fp)return 1;var raw=DA_SEQ[stepIdx].team;return da.fp===1?raw:(raw===1?2:1);}
function daUsed(){return da.picks1.concat(da.picks2);}
function daAvailable(allB){var u=daUsed();return allB.filter(function(b){return u.indexOf(b)<0;});}

function daSuggestPicks(s,allB,forTeam){
  var avail=daAvailable(allB);var scored=[];
  for(var i=0;i<avail.length;i++){
    var b=avail[i];var score=50;var reasons=[];
    var bd=null;for(var j=0;j<s.brawlers.length;j++){if(s.brawlers[j].name===b){bd=s.brawlers[j];break;}}
    if(bd&&da.map&&bd.maps&&bd.maps[da.map]&&bd.maps[da.map].n>=2){
      var mapWr=(bd.maps[da.map].w/bd.maps[da.map].n)*100;
      score=mapWr*0.45+score*0.55;reasons.push("\uD83D\uDDFA "+da.map+": "+mapWr.toFixed(0)+"%");
    }else if(bd&&da.mode&&bd.modes&&bd.modes[da.mode]&&bd.modes[da.mode].n>=2){
      var modeWr=(bd.modes[da.mode].w/bd.modes[da.mode].n)*100;
      score=modeWr*0.40+score*0.60;reasons.push("\uD83C\uDFAE "+da.mode+": "+modeWr.toFixed(0)+"%");
    }else if(bd){score=(+bd.wr)*0.30+score*0.70;}
    var enemyP=forTeam===1?da.picks2:da.picks1;
    for(var ei=0;ei<enemyP.length;ei++){var ck=b+"_vs_"+enemyP[ei];var cm=s.counters[ck];if(cm&&cm.t>=2){var cwr=(cm.w/cm.t)*100;score+=(cwr-50)*0.35;reasons.push("\uD83D\uDD2A vs "+enemyP[ei]+": "+cwr.toFixed(0)+"%");}}
    var ownP=forTeam===1?da.picks1:da.picks2;
    for(var oi=0;oi<ownP.length;oi++){var sk1=b+"_with_"+ownP[oi],sk2=ownP[oi]+"_with_"+b;var sm=s.synergies[sk1]||s.synergies[sk2];if(sm&&sm.t>=2){var swr=(sm.w/sm.t)*100;score+=(swr-50)*0.20;reasons.push("\uD83E\uDD1D +"+ownP[oi]+": "+swr.toFixed(0)+"%");}}
    if(bd){var conf=Math.min(1,bd.p/8);score=score*conf+50*(1-conf);}
    score=Math.max(0,Math.min(100,score));
    scored.push({name:b,score:score,reasons:reasons,bd:bd});
  }
  scored.sort(function(a,b){return b.score-a.score;});
  return scored;
}

          h+='<div onclick="daConfirm(\''+rg.name.replace(/'/g,"\\'")+'\');" style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);transition:all .15s" onmouseover="this.style.borderColor=\'var(--green)\'" onmouseout="this.style.borderColor=\'var(--border)\'">';
          h+=bIconSm(rg.name)+'<div><div style="font-size:11px;font-weight:700">'+rg.name+'</div><div style="font-family:var(--mono);font-weight:800;font-size:11px;color:'+rgC+'">'+rg.score.toFixed(0)+'</div></div></div>';
        }
        h+='</div>';
      }
      h+='</div>';
      if(da.picks1.length>0){
        var enemySugg=daSuggestPicks(ctxS,allB,2).slice(0,4);
        h+='<div style="margin-bottom:14px;padding:10px 14px;background:rgba(231,76,60,.06);border:1px solid rgba(231,76,60,.2);border-radius:10px"><div style="font-size:10px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">\u26A0\uFE0F L\'ENNEMI POURRAIT PICK</div>';
        h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
        for(var ei2=0;ei2<enemySugg.length;ei2++){var es=enemySugg[ei2];h+='<div style="display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;background:rgba(231,76,60,.08);font-size:11px;color:var(--t2)">'+bIconSm(es.name)+' '+es.name+'</div>';}
        h+='</div></div>';
      }
    }
    h+='<div class="card" style="padding:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
    h+='<span style="font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase">'+(isYourTurn?"Clique pour confirmer ton pick":"Clique sur le pick ennemi")+'</span>';
    h+='<input class="search-box" placeholder="\u29BF Search..." oninput="da.searchQ=this.value.toLowerCase();go(\'draftassist\')" value="'+(da.searchQ||"")+'" style="max-width:200px;padding:5px 12px;font-size:12px;margin:0 0 0 auto"></div>';
    var avail=daAvailable(allB);
    h+='<div class="b-grid" style="grid-template-columns:repeat(auto-fill,minmax(52px,1fr))">';
    for(var bi=0;bi<avail.length;bi++){var bName=avail[bi];
      if(da.searchQ&&bName.toLowerCase().indexOf(da.searchQ)<0)continue;
      h+='<div class="b-icon" style="background:'+bc(bName)+';width:52px;height:52px" onclick="daConfirm(\''+bName.replace(/'/g,"\\'")+'\');" title="'+bName+'">';
      if(bImgSrc(bName))h+='<img src="'+bImgSrc(bName)+'" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:8px;position:absolute;top:0;left:0" onerror="this.onerror=null;this.src=\''+bImgSrc2(bName)+'\'">';
      h+='<div class="b-icon-name">'+bName+'</div></div>';
    }
    h+='</div></div>';
  }else{
    var t1Score=0,t2Score=0;
    for(var ai=0;ai<da.picks1.length;ai++){var abd=null;for(var aj=0;aj<ctxS.brawlers.length;aj++){if(ctxS.brawlers[aj].name===da.picks1[ai]){abd=ctxS.brawlers[aj];break;}}t1Score+=abd?(+abd.wr):50;}
    for(var ai2=0;ai2<da.picks2.length;ai2++){var abd2=null;for(var aj2=0;aj2<ctxS.brawlers.length;aj2++){if(ctxS.brawlers[aj2].name===da.picks2[ai2]){abd2=ctxS.brawlers[aj2];break;}}t2Score+=abd2?(+abd2.wr):50;}
    for(var hi=0;hi<da.picks1.length;hi++){for(var hj=0;hj<da.picks2.length;hj++){var hk=da.picks1[hi]+"_vs_"+da.picks2[hj];var hm=ctxS.counters[hk];if(hm&&hm.t>=2){var hwr=(hm.w/hm.t)*100;if(hwr>50)t1Score+=(hwr-50)*0.5;else t2Score+=(50-hwr)*0.5;}}}
    var advPct=(t1Score+t2Score>0)?(t1Score/(t1Score+t2Score))*100:50;
    h+='<div class="card" style="padding:24px;border:2px solid var(--green)"><div style="text-align:center;margin-bottom:20px"><div style="font-size:20px;font-weight:900;margin-bottom:4px">\u2705 DRAFT TERMIN\u00C9</div><div style="font-size:12px;color:var(--t3)">Avantage estim\u00E9</div></div>';
    h+='<div class="adv-bar" style="max-width:400px;margin:0 auto 6px"><div class="adv-bar-l" style="width:'+advPct+'%"></div><div class="adv-bar-r" style="width:'+(100-advPct)+'%"></div></div>';
    h+='<div style="display:flex;justify-content:space-between;max-width:400px;margin:0 auto 20px"><span style="font-family:var(--mono);font-weight:800;color:var(--green)">YOU '+advPct.toFixed(0)+'%</span><span style="font-family:var(--mono);font-weight:800;color:var(--red)">ENEMY '+(100-advPct).toFixed(0)+'%</span></div>';
    h+='<div style="font-weight:700;font-size:11px;color:var(--t3);text-transform:uppercase;margin-bottom:8px">MATCHUPS</div>';
    h+='<table><thead><tr><th>Votre pick</th><th>vs</th><th>WR</th></tr></thead><tbody>';
    for(var di=0;di<da.picks1.length;di++){for(var dj=0;dj<da.picks2.length;dj++){var dk=da.picks1[di]+"_vs_"+da.picks2[dj];var dm=ctxS.counters[dk];if(dm&&dm.t>=2){var dwr=((dm.w/dm.t)*100).toFixed(1);h+='<tr><td><div style="display:flex;align-items:center;gap:4px">'+bIconSm(da.picks1[di])+' '+da.picks1[di]+'</div></td><td><div style="display:flex;align-items:center;gap:4px">'+bIconSm(da.picks2[dj])+' '+da.picks2[dj]+'</div></td><td class="'+wrCol(dwr)+'" style="font-family:var(--mono)">'+dwr+'%</td></tr>';}}}
    h+='</tbody></table><button class="btn btn-g" onclick="daReset()" style="margin-top:20px;padding:10px 24px;font-size:13px;font-weight:800;display:block;margin-left:auto;margin-right:auto">\uD83D\uDD04 Nouveau Draft</button></div>';
  }
  h+='</div>';el.innerHTML=h;
}

// ═══ TILT DETECTOR ═══
function pgTilt(el,s,data){
  var h='<div class="fade">';
  h+='<div style="font-size:22px;font-weight:900;margin-bottom:16px">📉 TILT DETECTOR</div>';
  h+=buildModePills();
  
  // Analyze all teams/players momentum
  var teamMomentum={};
  var sortedData=data.slice().sort(function(a,b){var ka=a.date||"",kb=b.date||"";return ka>kb?1:ka<kb?-1:0;});
  
  sortedData.forEach(function(r){
    [r.team1_name,r.team2_name].forEach(function(tn,idx){
      if(!tn||tn.indexOf("Unknown")===0)return;
      if(!teamMomentum[tn])teamMomentum[tn]={results:[],dates:[]};
      var isWin=(idx===0&&r.result==="victory")||(idx===1&&r.result!=="victory");
      teamMomentum[tn].results.push(isWin?1:0);
      teamMomentum[tn].dates.push(r.date);
    });
  });
  
  var tiltList=[];
  for(var tk in teamMomentum){var tm=teamMomentum[tk];
    if(tm.results.length<5)continue;
    var total=tm.results.length;
    var last5=tm.results.slice(-5);
    var last10=tm.results.slice(-10);
    var first=tm.results.slice(0,Math.floor(total/2));
    var second=tm.results.slice(Math.floor(total/2));
    var wrAll=(tm.results.reduce(function(a,b){return a+b;},0)/total*100);
    var wr5=(last5.reduce(function(a,b){return a+b;},0)/last5.length*100);
    var wr10=last10.length?(last10.reduce(function(a,b){return a+b;},0)/last10.length*100):wrAll;
    var wrFirst=first.length?(first.reduce(function(a,b){return a+b;},0)/first.length*100):50;
    var wrSecond=second.length?(second.reduce(function(a,b){return a+b;},0)/second.length*100):50;
    var trend=wrSecond-wrFirst;
    // Streak
    var streak=0,streakType="";
    for(var si=tm.results.length-1;si>=0;si--){
      if(si===tm.results.length-1){streakType=tm.results[si]?"W":"L";streak=1;}
      else if((tm.results[si]===1&&streakType==="W")||(tm.results[si]===0&&streakType==="L")){streak++;}
      else break;
    }
    var status="stable";var statusColor="var(--t3)";var statusIcon="➖";
    if(wr5<35&&trend<-10){status="TILTING";statusColor="var(--red)";statusIcon="🔻";}
    else if(wr5<40){status="cold";statusColor="#e67e22";statusIcon="❄️";}
    else if(wr5>=65&&trend>10){status="ON FIRE";statusColor="var(--green)";statusIcon="🔥";}
    else if(wr5>=60){status="hot";statusColor="var(--green)";statusIcon="📈";}
    var dbI=_findTeamDB(tk);var dispN=dbI?dbI.org:tk;
    tiltList.push({name:tk,dispName:dispN,total:total,wrAll:wrAll.toFixed(1),wr5:wr5.toFixed(0),wr10:wr10.toFixed(0),trend:trend.toFixed(0),streak:streak,streakType:streakType,status:status,statusColor:statusColor,statusIcon:statusIcon,last5:last5});
  }
  tiltList.sort(function(a,b){return(+a.wr5)-(+b.wr5);});
  
  // Tilting teams first, then fire, then stable
  var tilting=tiltList.filter(function(t){return t.status==="TILTING"||t.status==="cold";});
  var fire=tiltList.filter(function(t){return t.status==="ON FIRE"||t.status==="hot";});
  var stable=tiltList.filter(function(t){return t.status==="stable";});
  
  function renderTiltCard(t){
    var ch='<div class="card" style="margin-bottom:8px;border-left:3px solid '+t.statusColor+'">';
    ch+='<div style="display:flex;align-items:center;gap:12px">';
    ch+=teamLogo(t.name,32);
    ch+='<div style="flex:1"><div style="font-weight:800;font-size:14px">'+t.dispName+'</div>';
    ch+='<div style="font-size:11px;color:var(--t3)">'+t.total+' games</div></div>';
    // Last 5 dots
    ch+='<div style="display:flex;gap:3px;margin-right:12px">';
    for(var di=0;di<t.last5.length;di++){ch+='<div style="width:10px;height:10px;border-radius:50%;background:'+(t.last5[di]?"var(--green)":"var(--red)")+'"></div>';}
    ch+='</div>';
    // Status badge
    ch+='<div style="padding:4px 10px;border-radius:6px;background:'+t.statusColor+'20;color:'+t.statusColor+';font-weight:800;font-size:11px;font-family:var(--mono)">'+t.statusIcon+' '+t.status.toUpperCase()+'</div>';
    // Stats
    ch+='<div style="text-align:right;min-width:100px">';
    ch+='<div style="font-family:var(--mono);font-weight:800;font-size:16px;color:'+t.statusColor+'">'+t.wr5+'%</div>';
    ch+='<div style="font-size:9px;color:var(--t3)">Last 5 · Streak: '+t.streak+t.streakType+'</div>';
    ch+='<div style="font-size:9px;color:var(--t3)">Trend: <span style="color:'+(+t.trend>0?"var(--green)":"var(--red)")+'">'+((+t.trend>0)?"+":"")+t.trend+'%</span></div>';
    ch+='</div></div></div>';return ch;
  }
  
  if(tilting.length){
    h+='<div style="font-weight:800;font-size:14px;color:var(--red);margin-bottom:8px">🔻 TILTING / COLD ('+tilting.length+')</div>';
    for(var ti=0;ti<tilting.length;ti++){h+=renderTiltCard(tilting[ti]);}
  }
  if(fire.length){
    h+='<div style="font-weight:800;font-size:14px;color:var(--green);margin-bottom:8px;margin-top:16px">🔥 ON FIRE / HOT ('+fire.length+')</div>';
    for(var fi=0;fi<fire.length;fi++){h+=renderTiltCard(fire[fi]);}
  }
  if(stable.length){
    h+='<div style="font-weight:800;font-size:14px;color:var(--t3);margin-bottom:8px;margin-top:16px">➖ STABLE ('+stable.length+')</div>';
    for(var si2=0;si2<stable.length;si2++){h+=renderTiltCard(stable[si2]);}
  }
  h+='</div>';
  el.innerHTML=h;
}

function pgImport(el){
  var h='<div class="fade">';
  h+='</div>';
  el.innerHTML=h;
}
